<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>IFS stamps</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        .selected {
            background-color: lightgreen;
        }
    </style>
    <script src="./saveToFile.js"></script>
    <script src="./clipper.js"></script>
    <script src="./unionOfPoly_v3.js"></script>
</head>
<body>
    <h2>IFS stamps - ver 0.6</h2>

    <div>
        <button id="b1">Main triangle</button>
        <button id="b2" disabled="true">Add transform</button>
        <button id="b3">Reset triangles</button>
        &nbsp;
        <input type="range" id="recursion"  min="2" max="5" value="2"/>
        &nbsp; &nbsp;
        <button id="b4">Export to SVG</button>
        <br>

        <canvas id="theCanvas" width="600" height="480"></canvas>
        <canvas id="resultCanvas" width="600" height="480"></canvas>
    </div>
    <div>
        <div style="float:left;width:50%">
            <textarea id="editing" style="width:40em;height: 5em;"></textarea>
            <button id="submit">change</button>
        </div>
        <div style="float:left;width:30%">
            <b>Examples (to copy/paste in the text area)</b><br>
            Koch snowflake [<a href="koch stamp.json" target="_blank">link</a>], 
            Fern [<a href="fern.json" target="_blank">link</a>], 
            Fibonachos [<a href="fibonachos.json" target="_blank">link</a>]
        </div>
    </div>


<script>
const DEBUG = false;


const editingArea = document.querySelector("#editing");

const canvas2 = document.querySelector("#resultCanvas");
const ctx2 = canvas2.getContext("2d");
const canvasRect2 = canvas2.getBoundingClientRect();

ctx2.fillStyle = "rgb(250 250 250)";
ctx2.fillRect(0,0,canvasRect2.right,canvasRect2.bottom);


const canvas = document.querySelector("#theCanvas");
const ctx = canvas.getContext("2d");
const canvasRect = canvas.getBoundingClientRect();

let latestClickedPoint = null;

ctx.fillStyle = "rgb(250 250 250)";
ctx.fillRect(0,0,canvasRect.width,canvasRect.height);


let recursionLevel=2;
let mainTriangle = [];
let triangles = [];
let currentTriangle = null;
let Ws = []; // affine transforms
let drawingMode = null;

redraw();

canvas.onmousemove = function(evt){
    if (latestClickedPoint!=null){
        const x = evt.clientX - canvasRect.left;
        const y = evt.clientY - canvasRect.top;

        redraw();
        ctx.strokeStyle = "red";
        ctx.beginPath();
            ctx.moveTo(latestClickedPoint.x,latestClickedPoint.y);
            ctx.lineTo(x,y);
        ctx.stroke();
    }
}


canvas.onclick = function(event){
    let x = event.clientX - canvasRect.left;
    let y = event.clientY - canvasRect.top;
    //console.log(x,y);

    if (drawingMode == 1){
        mainTriangle.push( {x:x,y:y} );
        latestClickedPoint = {x:x,y:y};
        if (mainTriangle.length>=3){
            drawingMode = 0;
            document.querySelector("#b1").className="";
            document.querySelector("#b2").disabled = false;
            latestClickedPoint = null;
        }
    }
    if (drawingMode == 2){
        currentTriangle.push( {x:x,y:y} );
        latestClickedPoint = {x:x,y:y};
        if (currentTriangle.length>=3){
            drawingMode = 0;
            document.querySelector("#b2").className="";

            //DEBUG console.log(...mainTriangle , ...currentTriangle);

            // use only first 3 points, so it works even if mainTriangle is pentagon!
            let tri = mainTriangle.slice(0, 3);
            Ws.push( calculateTransform( ...tri , ...currentTriangle ) );
            latestClickedPoint = null;
        }
    }
    redraw();
}

document.querySelector("#submit").onclick = function(evt){
    let data = JSON.parse(editingArea.value);
    mainTriangle = data.main;
    triangles = data.transf;
    // re-calculate all affine transforms
    Ws = []; 

    // round to integer values    
    let rounded = triangles.map( tri => 
        tri.map( P => {
            return {'x': ~~P.x, 'y':~~P.y};
        })
    );
    triangles = rounded;

    mainTriangle = mainTriangle.map( P => {
        return {'x': ~~P.x, 'y':~~P.y};
    });
    
    for (let t of triangles){
        Ws.push( calculateTransform( ...mainTriangle , ...t ) );        
    }
    redraw();

    document.querySelector("#b2").disabled = false;
}

document.querySelector("#recursion").oninput = function(evt){
    recursionLevel = event.target.value;
    drawIFS();
}

document.querySelector("#b1").onclick = function(){    
    
    if (!DEBUG){
        document.querySelector("#b1").className="selected";
        drawingMode = 1;
        mainTriangle = [];
    }

    if (DEBUG){
        // DEBUG
        mainTriangle = [];
        mainTriangle.push({x:100,y:350});
        mainTriangle.push({x:175,y:80});
        mainTriangle.push({x:250,y:350});
        document.querySelector("#b2").disabled = false;
    }
    redraw();
}

document.querySelector("#b2").onclick = function(){
    document.querySelector("#b2").className="selected";
    drawingMode = 2;
    triangles.push( [] );
    currentTriangle = triangles[triangles.length-1];
    
    redraw();
}

// EXPORT TO SVG
document.querySelector("#b4").onclick = function(){

    if (mainTriangle.length<3){
        alert("Define the main triangle first, then export.");
        return;
    }


    // Create a unified polygon, following recursively all Ws
    let polyList = [];
    makePolyList(mainTriangle,recursionLevel, polyList); // => output is the list
    let unionPoly = unionPolys(...polyList); 

    let negative = subtract2Polys(
        boundingBox(unionPoly,0), 
        unionPoly ); 
    // console.log("negative:",negative);
    // DEBUG drawPoly(negative, "blue");

    
    let content = "";
    // create the SVG path for a shape
    content += createPathSVG(boundingBox(unionPoly,-5),"st0",{x:0,y:0});
    // DEBUG console.log(content);
    content += createPathSVG(negative,"st1",{x:0,y:0});
    // DEBUG console.log(content);
    
    content += createPathSVG(unionPoly,"st2",{x:400,y:0});

    // turn into a complete SVG file
    content = 
`<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 566.93 1077.17" xml:space="preserve">
<style type="text/css" id="style1">
	.st0{fill:none;stroke:#E30613;stroke-miterlimit:10;}
	.st1{fill:none;stroke:#009640;stroke-miterlimit:10;}
	.st2{fill:#E94E1B;}
</style>`    
+ content +
`</svg>`;

    downloadFile(content);
}

document.querySelector("#b3").onclick = function(){
    triangles = [];
    Ws = []; // affine transforms
    redraw();
}


function populateEditingArea(){
    let whole = {main:mainTriangle,
                transf:triangles};                
    editingArea.value = JSON.stringify(whole);
}

function redraw(){

    populateEditingArea();


    ctx.fillStyle = "rgb(250 250 250)";
    ctx.fillRect(0,0,canvasRect.right,canvasRect.bottom);

    ctx.font = "16px serif";
    ctx.fillStyle = "green";
    ctx.strokeStyle = "green";
    let i=0;
    for (let p of mainTriangle){
        i++;
        ctx.fillRect(p.x-1,p.y-1,3,3);
        ctx.fillText(i, p.x,p.y);
    }
    if (mainTriangle.length>=1){
        ctx.fillStyle = "rgb(80 250 80)";
        ctx.strokeStyle = "ligthgreen";
        ctx.beginPath();
        ctx.moveTo(mainTriangle[0].x,mainTriangle[0].y);
        for (let p of mainTriangle){
            ctx.lineTo(p.x,p.y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fill();
    }

    ctx.font = "16px serif";
    for (let t of triangles){
        ctx.fillStyle = "lightblue";
        ctx.strokeStyle = "cyan";
        ctx.beginPath();
        i=0;
        if (t.length>1){
            ctx.moveTo(t[0].x,t[0].y);
        
            for (let p of t){
                i++;
                ctx.fillStyle = "lightblue";
                ctx.fillRect(p.x-1,p.y-1,3,3);
                ctx.fillStyle = "blue";
                ctx.fillText(i, p.x,p.y);

                ctx.lineTo(p.x,p.y);
            }
        }
        if (t.length==1){
            ctx.fillStyle = "lightblue";
            ctx.fillRect(t[0].x-1,t[0].y-1,3,3);
            ctx.fillStyle = "blue";
            ctx.fillText(1, t[0].x,t[0].y);
        }
        ctx.closePath();
        ctx.stroke();
    }

    drawIFS();
}



// Cramer and 3x3 determinants
// https://www.chilimath.com/lessons/advanced-algebra/cramers-rule-with-three-variables/
// https://www.geeksforgeeks.org/maths/determinant-of-3x3-matrix/
function solve3X3(a1,b1,c1,d1,
                 a2,b2,c2,d2,
                 a3,b3,c3,d3){


    let D = determinant(a1,b1,c1, 
                        a2,b2,c2,
                        a3,b3,c3);

    let Dx = determinant(d1,b1,c1, 
                         d2,b2,c2,
                         d3,b3,c3);
    
    let Dy = determinant(a1,d1,c1, 
                         a2,d2,c2,
                         a3,d3,c3);

    let Dz = determinant(a1,b1,d1, 
                         a2,b2,d2,
                         a3,b3,d3);

    let x = Dx / D;
    let y = Dy / D;
    let z = Dz / D;

    return [x,y,z];
}

function determinant(a,b,c, 
                     d,e,f,
                     g,h,i){
    return a*(e*i-f*h) - b*(d*i-f*g) + c*(d*h-e*g);
}

/*  a c e 
    b d f 
    0 0 1
*/
function calculateTransform(p1,p2,p3,    q1,q2,q3){
    // DEBUG    console.log(p1,p2,p3, " => " , q1,q2,q3);
    let [a,b,e] = solve3X3(p1.x,p1.y,1   , q1.x,
                             p2.x,p2.y,1   , q2.x,
                             p3.x,p3.y,1   , q3.x
                            );

    let [c,d,f] = solve3X3(p1.x,p1.y,1   , q1.y,
                             p2.x,p2.y,1   , q2.y,
                             p3.x,p3.y,1   , q3.y
                            );
                            
    return [a,b,c,d,e,f];
}


const palette = [
  "rgb(128, 255, 0)",
  "rgb(255, 255, 0)",
  "rgb(255, 192, 0)",
  "rgb(255, 64, 0)",
  "rgb(255, 0, 0)",
  "rgb(255, 128, 128)",
  "rgb(0, 0, 32)",
  "rgb(0, 0, 128)",
  "rgb(0, 64, 255)",
  "rgb(0, 192, 255)",
  "rgb(0, 255, 128)",
  "rgb(0, 255, 0)",

];

function drawIFS(){
    /*
    // DEBUG 
    for (let w of Ws){
        console.table(w);
    }
    */

    let tri = JSON.parse(JSON.stringify(mainTriangle)); // deep-clone!

    ctx2.resetTransform();
    ctx2.fillStyle = "rgb(250 250 250)";
    ctx2.fillRect(0,0,canvasRect2.width,canvasRect2.height);    

    /*
    // draw original mainTriangle
    ctx2.fillStyle = "green";
    ctx2.strokeStyle = "green";
    let i=0;
    for (let p of tri){
        i++;
        ctx2.fillRect(p.x-1,p.y-1,3,3);
    }
    */

    /* DEBUG
    ctx2.resetTransform();
    drawRecursively(tri,recursionLevel); // shape, levels
    */

    // Create a unified polygon, following recursively all Ws
    if (mainTriangle.length>=3){
        ctx2.resetTransform();
        let polyList = [];
        makePolyList(tri,recursionLevel, polyList); // => output is the list
        // DEBUG console.log("polyList",polyList);        
        let unionPoly = unionPolys(...polyList); 

        ctx2.save();
            ctx2.translate(400,0);
            ctx2.scale(.5,.5);
            drawPoly(unionPoly,"blue");
            drawPoly( boundingBox(unionPoly,-5) ,"red" , false);
        ctx2.restore();
        // DEBUG console.log("unionPoly",unionPoly);

        //draw a rect around the whole poly    
        drawPoly( boundingBox(unionPoly,-5) ,"red" , false);

        // DEBUG console.log("------->", boundingBox(unionPoly,10) );
        // NOT WOKING
        let negative = subtract2Polys(
            boundingBox(unionPoly,0), 
            unionPoly ); 
        console.log("negative:",negative);
        drawPoly(negative, "blue"); //"rgba(200,255,200,.5)");
    }
}

function appyTransformToPoly(w,poly){
    // remember: transform(a,c,b,d,e,f);
    let [a,c,b,d,e,f] = w;
    //console.log("affine transf application", w, poly);
    let result = poly.map( P => { return {'x': a*P.x+c*P.y+e,
                                          'y': b*P.x+d*P.y+f} 
                                });
    //console.log("affine transf =>", result);
    return result;
}

function makePolyList(poly,level,list){
    if (level<=1){
        list.push(poly);
    } else {
        for (let w of Ws){
            list.push( poly );
            let newPoly = appyTransformToPoly(w,poly);
            //console.log("-->>", poly,newPoly)
            makePolyList(newPoly,level-1,list);
        }
        // DEBUG console.log("makePolyList=>",JSON.stringify(list),level);
    }    
}

function drawRecursively(shape,level){
    if (level<=1){
        drawPoly( shape, "lightgreen" );
    } else {
        let which=0;
        for (let w of Ws){
            drawPoly( shape, "lightgreen" );
            let [a,b,c,d,e,f] = w;
            ctx2.save();
                // DEBUG  console.log( ".....".substr(5-level) ,"transform W",which++);
                ctx2.transform(a,c,b,d,e,f);
                drawRecursively(shape,level-1);
            ctx2.restore();
        }
    }
}

function drawPoly(tri,color,filled=true){
    ctx2.fillStyle = color;
    ctx2.strokeStyle = color
    ctx2.beginPath();
    i=0;
    if (tri.length>1){
        ctx2.moveTo(tri[0].x,tri[0].y);
    
        for (let p of tri){
            i++;
            //if (filled) ctx2.fillRect(p.x-1,p.y-1,3,3);            
            //ctx.fillText(i, p.x,p.y);

            ctx2.lineTo(p.x,p.y);
        }
    }
    ctx2.closePath();
    if (filled) ctx2.fill();
    else        ctx2.stroke();
}

function drawPolyStroke(tri,color){
    ctx2.strokeStyle = color
    ctx2.beginPath();
    i=0;
    if (tri.length>1){
        ctx2.moveTo(tri[0].x,tri[0].y);
    
        for (let p of tri){
            i++;
            //ctx2.fillRect(p.x-1,p.y-1,3,3);
            ctx2.lineTo(p.x,p.y);
        }
    }
    ctx2.closePath();
    ctx2.stroke();
}

function drawPoints(tri,color){
    ctx2.fillStyle = color;
    ctx2.strokeStyle = color
    ctx2.beginPath();
    i=0;
    for (let p of tri){
        i++;
        ctx2.fillRect(p.x-1,p.y-1,3,3);
    }
}


// relative to initial pos
function createPathSVG(polyline,className,translateP){
    let output = `<path class="${className}" d="`;
    for (let i=0;i<polyline.length;i++){
        let p = polyline[i];
        if (i==0){
            output += `m ${ p.x + translateP.x },${ p.y + translateP.y }\n`;
        } else {
            output += `l ${ p.x-polyline[i-1].x },${ p.y-polyline[i-1].y }\n`;
        }
    }
    output += `Z\n`; // to close the shape
    output += '"/>';

    return output;
}
</script>
